name: BIST Daily Scanner

on:
  schedule:
    # UTC 18:00 = Turkiye Saati 21:00
    - cron: '0 18 * * *'
  # Butona basarak manuel test etmeyi sağlar (GitHub reposundaki Actions sekmesinden)
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scanner Script
      env:
        TV_USER: ${{ secrets.TV_USERNAME }}
        TV_PASS: ${{ secrets.TV_PASSWORD }}
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bist_scanner.py
