name: BIST Daily Scanner

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev libxslt1-dev python3-dev

    - name: Install tvDatafeed manually
      run: |
        wget https://github.com/rongardFtv/tvDatafeed/archive/refs/heads/main.zip
        unzip main.zip
        pip install tvDatafeed-main/

    - name: Install other Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Run Scanner Script
      env:
        TV_USER: ${{ secrets.TV_USERNAME }}
        TV_PASS: ${{ secrets.TV_PASSWORD }}
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bist_scanner.py
